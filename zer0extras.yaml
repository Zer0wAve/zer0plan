# zer0extras — 手机端综合覆写（DNS / Tailscale / MITM / 等）
# 在 Stash/Clash Party 的 SubStore 中作为额外覆写使用
# 运行顺序：先跑主 override JS（zer0plan.min.js），再跑此 YAML
# jsDelivr: https://cdn.jsdelivr.net/gh/Zer0wAve/zer0plan@main/zer0extras.yaml

# ===== DNS 配置（暂时注释，用 zer0plan.js 自带的）=====
# dns:
#   default-nameserver:
#     - 223.5.5.5
#     - 119.29.29.29
#   nameserver:
#     - 223.5.5.5
#     - 119.29.29.29
#     - system
#   fallback:
#     - https://dns.cloudflare.com/dns-query
#     - https://dns.google/dns-query
#   proxy-server-nameserver:
#     - https://dns.alidns.com/dns-query
#     - https://doh.pub/dns-query

# ===== 在 proxies 最前面插入 Tailscale 节点 =====
+proxies:
  - name: Homesweethome
    type: tailscale
    auth-key: ""
    ephemeral: false
    benchmark-url: http://192.168.0.1
    benchmark-timeout: 5
    benchmark-disabled: false

# ===== 新增 Homeland 代理组（隐藏，手动选择 Tailscale）=====
+proxy-groups:
  - name: Homeland
    type: select
    proxies:
      - Homesweethome
    hidden: true

# ===== QUIC 屏蔽（Stash Script Shortcuts，比 AND 规则更高效）=====
script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443

# ===== 在 rules 头部追加局域网直连规则 + QUIC 屏蔽 =====
+rules:
  - SCRIPT,quic,REJECT
  - DOMAIN,hen-avior.ts.net,Homeland
  - IP-CIDR,100.64.0.0/10,Homeland
  - IP-CIDR,192.168.0.0/16,Homeland
