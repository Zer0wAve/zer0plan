# zer0extras — 手机端综合覆写（DNS / Tailscale / MITM / 等）
# 在 Stash/Clash Party 的 SubStore 中作为额外覆写使用
# 运行顺序：先跑主 override JS（convert.min.js），再跑此 YAML
# jsDelivr: https://cdn.jsdelivr.net/gh/Zer0wAve/zer0plan@main/zer0extras.yaml

# ===== DNS 配置（简化版，符合 Stash 高效配置建议）=====
dns:
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - system
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# ===== 规则集覆写（classical → domain 优化内存）=====
# Crypto/TikTok/SteamFix/AdditionalFilter/AdditionalCDNResources 改为 domain 行为
# 注意：上游源文件仍是 classical 格式，若 Stash 不兼容需回退
rule-providers:
  Crypto:
    behavior: domain
  TikTok:
    behavior: domain
  SteamFix:
    behavior: domain
  AdditionalFilter:
    behavior: domain
  AdditionalCDNResources:
    behavior: domain

# ===== 在 proxies 最前面插入 Tailscale 节点 =====
+proxies:
  - name: Homesweethome
    type: tailscale
    auth-key: ""
    ephemeral: false

# ===== 新增 Homeland 代理组（隐藏，手动选择 Tailscale）=====
+proxy-groups:
  - name: Homeland
    type: select
    proxies:
      - Homesweethome
    hidden: true

# ===== 在 rules 末尾追加局域网直连规则 =====
rules+:
  - IP-CIDR,192.168.0.0/24,Homeland
