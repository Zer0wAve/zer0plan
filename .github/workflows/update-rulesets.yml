name: Update Converted Rulesets

on:
  schedule:
    # every day at 08:00 UTC (16:00 CST)
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Convert upstream rulesets
        run: python3 scripts/convert_rulesets.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruleset/converted/
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: auto-update converted rulesets"
            git push
          fi
